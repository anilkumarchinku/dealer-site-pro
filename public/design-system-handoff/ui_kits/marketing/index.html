<!-- DealerSite Pro landing — handoff reference copy (see ../../README.md). Tags stripped so this copy is not indexed by the design system. -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DealerSite Pro — Launch a dealer website that sells</title>
<link rel="icon" href="/dealersite-pro-shield.png" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  * { box-sizing: border-box; }
  :root { --dsp-topnav-height: 90px; }
  html { min-height: 100%; overflow-y: auto; scroll-behavior: smooth; scroll-padding-top: calc(var(--dsp-topnav-height) + 24px); }
  body { min-height: 100%; margin: 0; overflow-x: hidden; background: var(--surface-stage); font-family: var(--font-body); color: var(--text-body); -webkit-font-smoothing: antialiased; }
  a { color: inherit; }
  ::selection { background: var(--ink-900); color: var(--cream-50); }
  #market-top, #budget, #body, #brands, #listing, #launches, #ev, #ev-zone, #finance, #dealers, #compare, #preview, #pricing, #faq, #all-brands { scroll-margin-top: calc(var(--dsp-topnav-height) + 88px); }

  .dsp-market-topnav-shell {
    position: fixed;
    top: 0;
    right: 0;
    left: 0;
    z-index: 90;
    border-bottom: 1px solid var(--border-inverse);
    background: linear-gradient(180deg, rgb(11 14 18 / 0.99), rgb(11 14 18 / 0.96));
    box-shadow: 0 16px 36px rgb(11 14 18 / 0.22);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
  }

  .dsp-market-topnav {
    min-height: var(--dsp-topnav-height);
    display: grid;
    grid-template-columns: auto minmax(0, 1fr);
    align-items: center;
    gap: 18px;
  }

  .dsp-market-topnav-brand {
    text-decoration: none;
    color: var(--cream-50);
  }

  .dsp-market-topnav-links {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 20px;
  }

  .dsp-market-topnav-link {
    min-height: 42px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border: 0;
    border-radius: 999px;
    background: transparent;
    color: var(--text-on-dark-muted);
    padding: 0 10px;
    text-decoration: none;
    font-family: var(--font-body);
    font-size: 15px;
    font-weight: 900;
    white-space: nowrap;
    cursor: pointer;
  }

  .dsp-market-topnav-link:hover {
    color: var(--cream-50);
  }

  .dsp-market-topnav-pill {
    background: var(--cream-50);
    color: var(--ink-900);
    padding: 0 18px;
  }

  .dsp-market-topnav-cta {
    min-height: 52px;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    border: 0;
    border-radius: 999px;
    background: var(--cream-50);
    color: var(--ink-900);
    padding: 0 20px;
    font-family: var(--font-body);
    font-size: 14px;
    font-weight: 950;
    white-space: nowrap;
    cursor: pointer;
    box-shadow: 0 14px 34px rgb(0 0 0 / 0.22);
  }

  .dsp-market-topnav-cta:hover {
    background: var(--bronze-400);
    color: var(--ink-900);
  }

  .dsp-floating-mode-switch {
    position: fixed;
    right: clamp(16px, 2.6vw, 30px);
    bottom: clamp(18px, 3vw, 32px);
    z-index: 120;
    width: 54px;
    height: 54px;
    display: inline-grid;
    place-items: center;
    border: 1px solid rgb(255 253 247 / 0.16);
    border-radius: 999px;
    background: var(--ink-900);
    color: var(--cream-50);
    box-shadow: 0 18px 46px rgb(11 14 18 / 0.34);
    cursor: pointer;
    transition:
      transform 160ms var(--ease-out),
      background 160ms var(--ease-out),
      border-color 160ms var(--ease-out),
      color 160ms var(--ease-out),
      box-shadow 160ms var(--ease-out);
  }

  .dsp-floating-mode-switch::after {
    content: attr(data-label);
    position: absolute;
    right: calc(100% + 12px);
    top: 50%;
    transform: translate(8px, -50%);
    min-width: max-content;
    border: 1px solid rgb(199 154 91 / 0.34);
    border-radius: 999px;
    background: var(--cream-50);
    color: var(--ink-900);
    padding: 9px 12px;
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 950;
    opacity: 0;
    pointer-events: none;
    box-shadow: 0 12px 30px rgb(11 14 18 / 0.18);
    transition: opacity 160ms var(--ease-out), transform 160ms var(--ease-out);
  }

  .dsp-floating-mode-switch:hover,
  .dsp-floating-mode-switch:focus-visible {
    transform: translateY(-2px);
    border-color: rgb(199 154 91 / 0.5);
    background: var(--cream-50);
    color: var(--ink-900);
    box-shadow: 0 22px 54px rgb(11 14 18 / 0.28);
    outline: none;
  }

  .dsp-floating-mode-switch:hover::after,
  .dsp-floating-mode-switch:focus-visible::after {
    opacity: 1;
    transform: translate(0, -50%);
  }

  .dsp-market-mega {
    position: absolute;
    top: 100%;
    right: 0;
    left: 0;
    border-top: 1px solid var(--border-inverse);
    border-bottom: 1px solid var(--border-subtle);
    background: rgb(255 253 247 / 0.98);
    box-shadow: 0 28px 52px rgb(11 14 18 / 0.2);
  }

  .dsp-market-mega-grid {
    display: grid;
    grid-template-columns: 1.25fr 1fr 1fr 1fr;
    gap: 76px;
    padding: 34px 0 38px;
  }

  .dsp-market-mega-column h3 {
    margin: 0 0 18px;
    color: var(--stone-500);
    font-size: 12px;
    font-weight: 950;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }

  .dsp-market-menu-list {
    display: grid;
    gap: 14px;
  }

  .dsp-market-menu-action,
  .dsp-market-menu-view-all {
    min-height: 28px;
    display: inline-flex;
    align-items: center;
    gap: 12px;
    color: var(--text-body);
    text-decoration: none;
    font-family: var(--font-body);
    font-size: 15px;
    font-weight: 820;
    cursor: pointer;
  }

  .dsp-market-menu-action:hover,
  .dsp-market-menu-view-all:hover {
    color: var(--bronze-500);
  }

  .dsp-market-menu-logo {
    width: 28px;
    height: 28px;
    display: grid;
    place-items: center;
    border: 1px solid var(--vrf-hairline);
    border-radius: 7px;
    background: var(--vrf-surface);
    overflow: hidden;
    flex: none;
  }

  .dsp-market-menu-logo img {
    max-width: 22px;
    max-height: 20px;
    object-fit: contain;
  }

  .dsp-market-menu-logo span {
    color: var(--bronze-500);
    font-size: 10px;
    font-weight: 950;
  }

  .dsp-market-menu-emoji {
    width: 22px;
    display: inline-grid;
    place-items: center;
    flex: none;
  }

  .dsp-market-menu-view-all {
    margin-top: 4px;
    color: var(--ink-900);
    font-weight: 950;
  }

  /* ---- Responsive ---- */
  @media (max-width: 1000px) {
    :root { --dsp-topnav-height: 154px; }
    .dsp-hero-grid { grid-template-columns: 1fr !important; }
    .dsp-topnav-links { display: none !important; }
    .dsp-hero-preview { margin-top: 8px; }
    .dsp-hero-preview > div:first-child { display: none; }
    .dsp-cat-grid { grid-template-columns: 1fr 1fr !important; }
    .dsp-steps { grid-template-columns: 1fr 1fr !important; gap: 28px 18px !important; }
    .dsp-step-line { display: none !important; }
    .dsp-leads-grid { grid-template-columns: 1fr !important; }
    .dsp-testi-grid { grid-template-columns: 1fr !important; }
    .dsp-price-grid { grid-template-columns: 1fr !important; max-width: 460px; margin-left: auto; margin-right: auto; }
    .dsp-faq-grid { grid-template-columns: 1fr !important; }
    .dsp-brand-grid { grid-template-columns: 1fr !important; }
    .dsp-tpl-grid { grid-template-columns: 1fr 1fr !important; }
    .dsp-tpl-lg, .dsp-tpl-sm { grid-column: span 1 !important; }
    .dsp-footer-grid { grid-template-columns: 1fr 1fr !important; gap: 28px !important; }
    .dsp-showcase-mobile { display: none !important; }
    .dsp-explorer-searchbar { grid-template-columns: 1fr !important; }
    .dsp-explorer-searchbar select { min-height: 52px; }
    .dsp-explorer-grid { grid-template-columns: 1fr !important; }
    .dsp-explorer-grid aside { border-right: none !important; border-bottom: 1px solid var(--border-subtle) !important; }
    .dsp-explorer-detail-grid { grid-template-columns: 1fr !important; }
    .dsp-market-hero-grid { grid-template-columns: 1fr !important; }
    .dsp-market-featured { min-height: 360px !important; }
    .dsp-market-search-row { grid-template-columns: 1fr !important; }
    .dsp-market-nav > div > div { grid-template-columns: 1fr !important; gap: 12px !important; padding: 14px 0 !important; }
    .dsp-market-nav-center { justify-content: flex-start !important; flex-wrap: wrap !important; }
    .dsp-market-nav-search { width: 100% !important; }
    .dsp-market-nav-actions { justify-content: flex-start !important; }
    .dsp-market-top-search { min-width: min(100%, 360px) !important; flex: 1 1 320px !important; }
    .dsp-market-action-grid { grid-template-columns: repeat(2, minmax(0, 1fr)) !important; }
    .dsp-market-action-grid > div { border-left: 0 !important; border-top: 1px solid rgba(255,253,247,0.12); }
    .dsp-market-action-grid > div:nth-child(-n+2) { border-top: 0; }
    .dsp-browse-rail { grid-template-columns: repeat(3, minmax(0, 1fr)) !important; }
    .dsp-listing-content { grid-template-columns: 1fr !important; }
    .dsp-filter-rail { position: relative !important; top: auto !important; max-height: none !important; overflow: visible !important; }
    .dsp-vehicle-card-grid { grid-template-columns: repeat(2, minmax(0, 1fr)) !important; }
    .dsp-market-launch-grid,
    .dsp-market-finance-grid,
    .dsp-market-ev-grid { grid-template-columns: 1fr !important; }
    .dsp-market-trust-grid { grid-template-columns: repeat(2, minmax(0, 1fr)) !important; }
    .dsp-market-dealer-grid { grid-template-columns: repeat(2, minmax(0, 1fr)) !important; }
    .dsp-market-footer-grid { grid-template-columns: 1fr 1fr !important; }
    .dsp-market-topnav {
      grid-template-columns: minmax(0, 1fr);
      gap: 12px;
      padding: 14px 0;
    }
    .dsp-market-topnav-links {
      min-width: 0;
      max-width: 100%;
    }
    .dsp-market-topnav-links {
      justify-content: flex-start;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }
    .dsp-market-topnav-links::-webkit-scrollbar { display: none; }
    .dsp-market-mega-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 32px;
      padding: 26px 0 30px;
    }
  }
  @media (max-width: 620px) {
    :root { --dsp-topnav-height: 172px; }
    html, body { overflow-x: hidden; }
    .dsp-cat-grid { grid-template-columns: 1fr !important; }
    .dsp-steps { grid-template-columns: 1fr !important; }
    .dsp-tpl-grid { grid-template-columns: 1fr !important; }
    .dsp-leads-grid > div:last-child { grid-template-columns: 1fr !important; }
    .dsp-footer-grid { grid-template-columns: 1fr !important; }
    .dsp-hero-canvas { padding: 28px !important; border-radius: 38px !important; }
    .dsp-hero-canvas h1 { font-size: clamp(2.25rem, 12vw, 3rem) !important; letter-spacing: 0 !important; }
    .dsp-hero-canvas p { font-size: 1.02rem !important; }
    .dsp-hero-grid,
    .dsp-hero-grid > *,
    .dsp-hero-preview,
    .dsp-hero-preview .dsp-car-float,
    .dsp-hero-preview .dsp-car-float > div { min-width: 0 !important; width: 100% !important; max-width: 100% !important; }
    .dsp-hero-preview { transform: none; overflow: hidden; }
    .dsp-hero-preview > div:not(.dsp-car-float) { display: none !important; }
    .dsp-hero-preview .dsp-car-float > div { transform: none !important; }
    .dsp-hero-preview * { min-width: 0; }
    .dsp-hero-canvas button { max-width: 100%; }
    .dsp-topnav { row-gap: 12px !important; align-items: flex-start !important; }
    .dsp-topnav-actions { width: 100%; gap: 10px !important; }
    .dsp-explorer-shell { border-radius: 32px !important; }
    .dsp-explorer-actions { grid-template-columns: 1fr !important; }
    .dsp-market-nav-links { display: none !important; }
    .dsp-market-nav-actions { width: 100%; }
    .dsp-market-nav-actions button { flex: 1 1 0; justify-content: center; }
    .dsp-market-search { border-radius: 26px !important; }
    .dsp-market-search > div:first-child { grid-template-columns: 1fr !important; border-radius: 22px !important; }
    .dsp-listing-head > div:last-child { width: 100%; }
    .dsp-market-top-search { width: 100% !important; min-width: 0 !important; }
    .dsp-market-action-grid { grid-template-columns: 1fr !important; }
    .dsp-market-action-grid > div { border-top: 1px solid rgba(255,253,247,0.12) !important; }
    .dsp-market-action-grid > div:first-child { border-top: 0 !important; }
    .dsp-browse-rail { grid-template-columns: 1fr 1fr !important; }
    .dsp-vehicle-card-grid { grid-template-columns: 1fr !important; }
    .dsp-market-launch-grid,
    .dsp-market-finance-grid,
    .dsp-market-ev-grid,
    .dsp-market-trust-grid,
    .dsp-market-dealer-grid,
    .dsp-market-footer-grid { grid-template-columns: 1fr !important; }
    .dsp-compare-dock { grid-template-columns: 1fr !important; }
    .dsp-market-mega-grid { grid-template-columns: 1fr; }
    .dsp-market-topnav-links { gap: 8px; }
    .dsp-market-topnav-link { font-size: 13px; }
    .dsp-market-topnav-cta { display: none; }
    .dsp-topnav-actions > button { flex: 1 1 100%; justify-content: center; }
    .dsp-floating-mode-switch {
      right: 14px;
      bottom: 16px;
      width: 48px;
      height: 48px;
    }
    .dsp-floating-mode-switch::after {
      display: none;
    }
  }
  .dsp-hero-canvas .dsp-nav-pills::-webkit-scrollbar { display: none; }

  /* Hero car float */
  @keyframes dsp-float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-16px); } }
  .dsp-car-float { animation: dsp-float 5.5s var(--ease-in-out) infinite; will-change: transform; }
  @media (prefers-reduced-motion: reduce) { .dsp-car-float { animation: none; } }

  /* Brand marquee */
  @keyframes dsp-scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
  .dsp-marquee-track { animation: dsp-scroll 38s linear infinite; will-change: transform; }
  .dsp-marquee:hover .dsp-marquee-track { animation-play-state: paused; }
  @media (prefers-reduced-motion: reduce) { .dsp-marquee-track { animation: none; } }

  @media (max-width: 1000px) {
    .dsp-stats-band { grid-template-columns: 1fr 1fr !important; }
    .dsp-stats-band .dsp-stat-cell:nth-child(3) { border-left: none !important; }
    .dsp-stats-band .dsp-stat-cell:nth-child(odd) { border-left: none !important; }
    .dsp-stats-band .dsp-stat-cell:nth-child(n+3) { border-top: 1px solid var(--border-inverse); }
  }
  @media (max-width: 560px) {
    .dsp-stats-band { grid-template-columns: 1fr !important; }
    .dsp-stats-band .dsp-stat-cell { border-left: none !important; border-top: 1px solid var(--border-inverse); }
    .dsp-stats-band .dsp-stat-cell:first-child { border-top: none; }
  }

  /* Ride Finder reference layout from the supplied ZIP */
  :root {
    --vrf-bg: var(--surface-stage, #f5f1ea);
    --vrf-surface: var(--cream-50, #fffdf7);
    --vrf-surface-2: var(--cream-100, #f4efe6);
    --vrf-foreground: var(--ink-900, #0b0e12);
    --vrf-muted: var(--text-muted, #756f66);
    --vrf-hairline: var(--border-subtle, #ded6ca);
    --vrf-brand: var(--bronze-500, #a8793a);
    --vrf-brand-foreground: var(--cream-50, #fffdf7);
    --vrf-success: var(--success, #2e7d50);
    --vrf-warning: var(--bronze-400, #c79a5b);
    --vrf-soft-shadow: 0 1px 2px rgb(11 14 18 / 0.04), 0 16px 34px -20px rgb(11 14 18 / 0.24);
    --vrf-lift-shadow: 0 2px 4px rgb(11 14 18 / 0.05), 0 26px 58px -24px rgb(11 14 18 / 0.28);
    --vrf-tray-shadow: 0 22px 64px -16px rgb(2 6 23 / 0.5);
  }

  .vrf-market {
    min-height: 100vh;
    background:
      radial-gradient(circle at 12% 4%, rgb(199 154 91 / 0.12), transparent 28%),
      linear-gradient(180deg, var(--surface-stage), var(--cream-100));
    color: var(--vrf-foreground);
    font-family: var(--font-body);
    letter-spacing: 0;
    overflow-x: hidden;
  }

  .vrf-container {
    width: min(100%, 1280px);
    margin: 0 auto;
    padding: 0 24px;
  }

  .vrf-section {
    padding: 64px 0;
  }

  .vrf-hero {
    position: relative;
    overflow: hidden;
    background:
      radial-gradient(circle at 18% 10%, rgb(199 154 91 / 0.24), transparent 30%),
      radial-gradient(circle at 74% 58%, rgb(46 125 80 / 0.12), transparent 28%),
      linear-gradient(180deg, var(--ink-900), var(--ink-800));
    padding: 48px 0 80px;
  }

  .vrf-hero::before {
    content: "";
    position: absolute;
    inset: 0 0 auto;
    height: 520px;
    background: linear-gradient(180deg, rgb(255 253 247 / 0.08), rgb(199 154 91 / 0));
    pointer-events: none;
  }

  .vrf-hero-grid {
    position: relative;
    display: grid;
    grid-template-columns: repeat(12, minmax(0, 1fr));
    gap: 48px;
    align-items: center;
  }

  .vrf-hero-copy {
    grid-column: span 6;
  }

  .vrf-hero-media {
    position: relative;
    grid-column: span 6;
  }

  .vrf-kicker {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border-radius: 999px;
    border: 1px solid var(--vrf-hairline);
    background: var(--vrf-surface);
    color: var(--vrf-brand);
    padding: 6px 12px;
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .vrf-hero h1 {
    margin: 20px 0 0;
    max-width: 680px;
    color: var(--cream-50);
    font-family: var(--font-display);
    font-size: clamp(3rem, 6vw, 5.9rem);
    line-height: 1.02;
    font-weight: 950;
    letter-spacing: 0;
  }

  .vrf-hero-line {
    display: inline;
  }

  .vrf-hero p {
    max-width: 610px;
    margin: 20px 0 0;
    color: var(--text-on-dark-muted);
    font-size: clamp(1rem, 1.8vw, 1.18rem);
    line-height: 1.65;
    font-weight: 650;
  }

  .vrf-search-panel {
    margin-top: 32px;
    border: 1px solid rgb(255 253 247 / 0.16);
    border-radius: 24px;
    background: rgb(255 253 247 / 0.96);
    padding: 8px;
    box-shadow: var(--vrf-tray-shadow);
  }

  .vrf-tabs {
    display: flex;
    gap: 4px;
    border-radius: 16px;
    background: var(--vrf-surface-2);
    padding: 4px;
  }

  .vrf-tab {
    flex: 1;
    min-height: 40px;
    border: 0;
    border-radius: 12px;
    background: transparent;
    color: var(--vrf-muted);
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 900;
    cursor: pointer;
  }

  .vrf-tab[data-active="true"] {
    background: var(--vrf-surface);
    color: var(--vrf-foreground);
    box-shadow: 0 1px 3px rgb(15 23 42 / 0.08);
  }

  .vrf-chip-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .vrf-chip {
    border: 1px solid var(--vrf-hairline);
    border-radius: 999px;
    background: var(--vrf-bg);
    color: var(--vrf-foreground);
    padding: 9px 14px;
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 900;
    cursor: pointer;
    transition: border-color 160ms var(--ease-out), background 160ms var(--ease-out), color 160ms var(--ease-out);
  }

  .vrf-chip[data-active="true"] {
    border-color: var(--vrf-brand);
    background: var(--vrf-brand);
    color: var(--vrf-brand-foreground);
  }

  .vrf-search-panel .vrf-chip {
    border-color: rgb(11 14 18 / 0.12);
    background: var(--cream-50);
    color: var(--ink-900);
  }

  .vrf-search-panel .vrf-chip:hover {
    border-color: rgb(178 123 47 / 0.45);
    background: rgb(178 123 47 / 0.12);
    color: var(--ink-900);
  }

  .vrf-search-panel .vrf-chip[data-active="true"] {
    border-color: var(--vrf-brand);
    background: var(--vrf-brand);
    color: var(--vrf-brand-foreground);
  }

  .vrf-search-row {
    display: flex;
    gap: 8px;
    margin-top: 16px;
    align-items: stretch;
  }

  .vrf-search-row .vrf-primary {
    min-width: 108px;
    white-space: nowrap;
  }

  .vrf-input {
    width: 100%;
    min-height: 48px;
    border: 1px solid var(--vrf-hairline);
    border-radius: 14px;
    background: #fffaf1;
    color: var(--ink-900);
    padding: 0 16px;
    outline: none;
    font-family: var(--font-body);
    font-size: 15px;
    font-weight: 850;
    box-shadow: inset 0 1px 0 rgb(255 255 255 / 0.8);
  }

  .vrf-search-row .vrf-input {
    min-height: 54px;

<script>
  // DealerSite Pro app bridge: keep the pasted design while routing primary actions
  // into the existing Next.js product flow.
  document.addEventListener('click', function (event) {
    var target = event.target.closest('button, a, [role="button"]');
    if (!target) return;

    var label = (target.textContent || '').replace(/\s+/g, ' ').trim();
    var href = target.getAttribute && target.getAttribute('href');

    if (href && href.startsWith('#')) return;

    if (/Create My Website|Start free|Start 14-day trial|Publish website/i.test(label)) {
      event.preventDefault();
      window.top.location.href = '/onboarding';
      return;
    }

    if (/See Sample Site|View Demo/i.test(label)) {
      event.preventDefault();
      if (window.openPreviewPage) {
        window.openPreviewPage();
      } else {
        var preview = document.getElementById('preview');
        if (preview) preview.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
      return;
    }

    if (/Talk to sales/i.test(label)) {
      event.preventDefault();
      window.top.location.href = 'mailto:sales@dealersitepro.com';
      return;
    }

    if (/Privacy/i.test(label)) {
      event.preventDefault();
      window.top.location.href = '/privacy';
      return;
    }

    if (/Terms/i.test(label)) {
      event.preventDefault();
      window.top.location.href = '/terms';
    }
  });
</script>
